services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - devgordon-net
    restart: unless-stopped
    volumes:
      - ~/.kube/config:/.kube/config:ro
    environment:
      - KUBECONFIG=/home/devgordon/.kube/config
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JENKINS_OPTS: "--httpPort=8080"
    networks:
      - devgordon-net
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10-community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - devgordon-net
    restart: unless-stopped
    # Note: SonarQube requires vm.max_map_count >= 524288 on the host:
    # sudo sysctl -w vm.max_map_count=524288

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:

networks:
  devgordon-net:
    driver: bridge
