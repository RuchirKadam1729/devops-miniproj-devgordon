# ---- DevGordon docker-compose.yml ----
# Run the entire stack: docker compose up -d
#
# Services:
#   app        — FastAPI backend + web UI (port 8000) — uses Ollama for all reasoning
#   ollama     — Local LLM server with tool calling (port 11434)
#   sonarqube  — Code quality scanning in CI/CD pipeline (port 9000)
#   jenkins    — CI/CD server (port 8080)
#
# First time setup:
#   1. docker compose up -d
#   2. ./scripts/pull-ollama-model.sh qwen3:8b   (pull model, ~5-10 min)
#   3. Open http://localhost:8000
#
# To use a different model:
#   ./scripts/pull-ollama-model.sh llama3.1:8b
#   Or change via the web UI: /select-model
#
# Model persists in the ollama_models Docker volume:
# - First pull: downloads model (~5-10 min)
# - Subsequent runs: instant, model loaded from volume
# - Switching models: pull again with different name

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devgordon-app
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      JENKINS_URL: http://jenkins:8080
      JENKINS_USER: admin
      JENKINS_TOKEN: ${JENKINS_TOKEN:-}
      SONAR_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      KUBECONFIG: /home/devgordon/.kube/config
      KUBE_API_SERVER: ${KUBE_API_SERVER:-}
    volumes:
      - ${HOST_KUBECONFIG:-~/.kube/config}:/home/devgordon/.kube/config:ro
    networks:
      - devgordon-net
    restart: unless-stopped

  # optional ollama container (only cpu)
  # ollama:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ollama
  #   container_name: devgordon-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     # Persist downloaded models — no re-download on restart
  #     - ollama_models:/root/.ollama
  #   networks:
  #     - devgordon-net
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 120
  #   # GPU support (uncomment if available):
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: devgordon-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JENKINS_OPTS: "--httpPort=8080"
    networks:
      - devgordon-net
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10-community
    container_name: devgordon-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - devgordon-net
    restart: unless-stopped
    # Note: SonarQube requires vm.max_map_count >= 524288 on the host:
    # sudo sysctl -w vm.max_map_count=524288

volumes:
  ollama_models:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:

networks:
  devgordon-net:
    driver: bridge
