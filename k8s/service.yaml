# k8s/service.yaml
# A Service exposes your Pods to the network.
#
# Without a Service, Pods are only reachable inside the cluster.
# NodePort type exposes the app on a port of the Minikube VM,
# so you can reach it from your laptop at minikube-ip:30080.
#
# Get Minikube's IP: minikube ip
# Then access at: http://<minikube-ip>:30080

apiVersion: v1
kind: Service
metadata:
  name: devgordon-service
  namespace: devgordon
spec:
  type: NodePort
  selector:
    app: devgordon          # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80              # Port inside the cluster
      targetPort: 8000      # Port your container listens on
      nodePort: 30080       # Port on the Minikube VM (30000-32767 range)

---
# Alternatively, use: minikube service devgordon-service -n devgordon
# This opens the service in your browser automatically
