# ansible/inventory.ini
#
# For deploying to localhost (the machine running Minikube)
# "connection=local" means Ansible doesn't SSH anywhere — it runs commands directly.
# This is the right setup for a dev/lab environment.

[local]
localhost ansible_connection=local

# If you had a remote server, it would look like:
# [servers]
# 192.168.1.100 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
